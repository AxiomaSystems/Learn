services:
  postgres:
    image: postgres:16
    container_name: axioma-postgres
    environment:
      POSTGRES_DB: axioma_learn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - axioma_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: axioma-redis
    ports:
      - "6379:6379"
    volumes:
      - axioma_redis_data:/data

volumes:
  axioma_postgres_data:
  axioma_redis_data:

